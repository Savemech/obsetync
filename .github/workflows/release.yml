name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create releases + upload assets
  packages: write   # push to ghcr.io

jobs:

  # ---------------------------------------------------------------------------
  # Plugin artifacts: build main.js + WASM, attach to the GitHub Release.
  # Users download these and drop them into their vault's
  # .obsidian/plugins/obsetync/ directory.
  # ---------------------------------------------------------------------------
  plugin:
    name: Build plugin artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 \
                wasm-pack-v0.13.1-x86_64-unknown-linux-musl/wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Build WASM
        run: |
          wasm-pack build crates/sync-core \
            --target web \
            --out-dir ../../plugin/wasm \
            --release \
            -- --features wasm --no-default-features

      - name: Build plugin bundle
        working-directory: plugin
        run: |
          npm ci --no-audit --no-fund
          node esbuild.config.mjs production

      - name: Package release assets
        run: |
          mkdir -p release/obsetync
          cp plugin/main.js        release/obsetync/
          cp plugin/manifest.json  release/obsetync/
          cp -r plugin/wasm        release/obsetync/wasm
          cd release && zip -r obsetync-${{ github.ref_name }}.zip obsetync

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/obsetync-*.zip
            plugin/main.js
            plugin/manifest.json
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Docker image: build via the Dockerfile, push to ghcr.io with semver tags.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image → ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Nix-built Docker image: hermetic build via the flake, pushed to ghcr with
  # a `-nix` tag suffix so users can opt into byte-identical image pulls.
  # ---------------------------------------------------------------------------
  docker-nix:
    name: Nix Docker image → ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build hermetic OCI image
        run: nix build .#dockerImage --print-build-logs

      - name: Load into Docker
        run: docker load < result

      - name: Tag + push
        env:
          REPO: ghcr.io/${{ github.repository }}-nix
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip 'v' prefix for docker tag convention.
          VERSION_CLEAN="${VERSION#v}"
          docker tag obsetync-server:nix "${REPO}:${VERSION_CLEAN}"
          docker tag obsetync-server:nix "${REPO}:latest"
          docker push "${REPO}:${VERSION_CLEAN}"
          docker push "${REPO}:latest"

  # ---------------------------------------------------------------------------
  # Bare-metal binary: extract the stripped sync-server binary via the Docker
  # build target, attach to the release for people who deploy without Docker.
  # ---------------------------------------------------------------------------
  binary:
    name: Server binary (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Extract binary
        run: |
          mkdir -p out
          docker buildx build \
            --target binary-dist \
            --output type=local,dest=out \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
          ls -la out
          file out/sync-server

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/sync-server
