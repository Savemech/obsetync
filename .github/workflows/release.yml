name: Release

on:
  push:
    tags:
      # Accept both conventions so the plugin can be tagged either `v1.0.2`
      # (docker-style) or `1.0.2` (Obsidian community plugins convention).
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create releases + upload assets
  packages: write   # push to ghcr.io

jobs:

  # ---------------------------------------------------------------------------
  # Plugin artifacts: build main.js + WASM, attach to the GitHub Release.
  # Obsidian's auto-updater (and BRAT) expects individual files at release root.
  # We also attach a zip with the proper folder structure for manual installs.
  # ---------------------------------------------------------------------------
  plugin:
    name: Build plugin artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 \
                wasm-pack-v0.13.1-x86_64-unknown-linux-musl/wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Build WASM
        run: |
          wasm-pack build crates/sync-core \
            --target no-modules \
            --out-dir ../../plugin/wasm \
            --release \
            -- --features wasm --no-default-features

      - name: Build plugin bundle
        working-directory: plugin
        run: |
          npm ci --no-audit --no-fund
          node esbuild.config.mjs production

      - name: Stage flat release assets
        run: |
          mkdir -p release
          # Files BRAT / Obsidian auto-updater download directly:
          cp plugin/main.js                   release/main.js
          cp plugin/manifest.json             release/manifest.json
          cp plugin/wasm/sync_core.js         release/sync_core.js
          cp plugin/wasm/sync_core_bg.wasm    release/sync_core_bg.wasm
          cp versions.json                    release/versions.json

          # ZIP for manual install (drop its contents into .obsidian/plugins/obsetync/).
          mkdir -p zip-staging/obsetync
          cp release/main.js                  zip-staging/obsetync/
          cp release/manifest.json            zip-staging/obsetync/
          cp release/sync_core.js             zip-staging/obsetync/
          cp release/sync_core_bg.wasm        zip-staging/obsetync/
          (cd zip-staging && zip -r ../release/obsetync-${{ github.ref_name }}.zip obsetync)

          echo "Release assets:"
          ls -la release/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/main.js
            release/manifest.json
            release/sync_core.js
            release/sync_core_bg.wasm
            release/versions.json
            release/obsetync-*.zip
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Docker image: build via the Dockerfile, push to ghcr.io with semver tags.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image → ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Nix-built Docker image: hermetic build via the flake, pushed to ghcr with
  # a `-nix` suffix so users can opt into byte-identical image pulls.
  # ---------------------------------------------------------------------------
  docker-nix:
    name: Nix Docker image → ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build hermetic OCI image
        run: nix build .#dockerImage --print-build-logs

      - name: Load into Docker
        run: docker load < result

      - name: Tag + push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Docker repo names must be lowercase; github.repository uses the
          # owner's casing. Lowercase here so "Savemech/obsetync" → "savemech/obsetync".
          REPO="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-nix"
          # Strip a leading 'v' for docker tag convention (1.0.2 not v1.0.2).
          VERSION_CLEAN="${VERSION#v}"
          docker tag obsetync-server:nix "${REPO}:${VERSION_CLEAN}"
          docker tag obsetync-server:nix "${REPO}:latest"
          docker push "${REPO}:${VERSION_CLEAN}"
          docker push "${REPO}:latest"

  # ---------------------------------------------------------------------------
  # Bare-metal server binary: extract the stripped sync-server for people who
  # deploy without Docker.
  # ---------------------------------------------------------------------------
  binary:
    name: Server binary (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Extract binary
        run: |
          mkdir -p out
          docker buildx build \
            --target binary-dist \
            --output type=local,dest=out \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
          ls -la out
          file out/sync-server

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/sync-server
