name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-flight runs when a new push happens on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Rust workspace: fmt, clippy, test. Uses native Rust (fast via Swatinem cache)
  # rather than Docker to keep CI under a minute on warm cache.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      # setup-rust-toolchain sets RUSTFLAGS=-D warnings by default which turns
      # any warning into a CI failure. We don't want that — clippy/warnings are
      # useful feedback but shouldn't block merging. Clear it for every step.
      - name: cargo fmt --check
        env:
          RUSTFLAGS: ""
        run: cargo fmt --all -- --check

      - name: cargo clippy
        env:
          RUSTFLAGS: ""
        run: cargo clippy --workspace --locked --all-targets

      - name: cargo test
        env:
          RUSTFLAGS: ""
          CC: clang
        run: cargo test --workspace --locked

      - name: cargo check wasm
        env:
          RUSTFLAGS: ""
        run: cargo check -p sync-core --target wasm32-unknown-unknown --features wasm --no-default-features --locked

  # ---------------------------------------------------------------------------
  # Plugin: type-check the TypeScript source. Does NOT run the bundler — that's
  # the release workflow's job. CI just validates that the source compiles.
  # ---------------------------------------------------------------------------
  plugin:
    name: Plugin (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - run: npm ci --no-audit --no-fund

      - run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Docker: verify the multi-stage Dockerfile still builds end-to-end.
  # Uses gha cache so warm runs are fast.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (server image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: false
          tags: obsetync/server:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ---------------------------------------------------------------------------
  # E2E: spin up the isolated docker-compose stack and run the e2e suite
  # against it. Reuses the gha buildx cache the `docker` job populated, so
  # warm runs build the image in seconds.
  #
  # Coverage: enrollment lifecycle, single-device push/pull, two-device sync,
  # the full conflict-resolution truth table, and AEAD transport security.
  # See docs/conflict-resolution.md.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (compose stack + conflict suite)
    runs-on: ubuntu-latest
    needs: docker  # depend on docker job so the gha cache is warm
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0

      - uses: docker/setup-buildx-action@v3

      # Build the server image with the same gha cache the `docker` job uses.
      # `load: true` puts it into the runner's docker daemon under the
      # tag the e2e compose file expects (`obsetync/server:local`). Cache
      # hit from the previous `docker` job → near-instant restore.
      - name: Build server image (load into docker)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          load: true
          tags: obsetync/server:local
          cache-from: type=gha

      - name: Bring up e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:27282/health >/dev/null 2>&1; then
              echo "ready"; exit 0
            fi
            sleep 1
          done
          echo "::error::server failed to become healthy in 60s"
          docker compose -f docker-compose.e2e.yml logs --tail=120 e2e-server
          exit 1

      - name: Run E2E suite
        env:
          RUSTFLAGS: ""
          CC: clang
          # Tests serialize because they share a single server container's
          # state. They also use unique vault_ids so accumulating state
          # between tests doesn't leak.
        run: cargo test -p e2e-tests --features e2e --locked -- --test-threads=1

      - name: Dump server logs (on failure)
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --tail=300 e2e-server

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # Nix: flake check (runs tests via crane) + build server derivation.
  # Proves the hermetic path stays green.
  # ---------------------------------------------------------------------------
  nix:
    name: Nix (flake check + build server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check --print-build-logs

      - name: nix build .#server
        run: nix build .#server --print-build-logs
