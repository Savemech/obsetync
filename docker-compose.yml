# ==============================================================================
# ObsetyNC — everything you need, driven by `docker compose`.
#
#   docker compose build                      # build every image
#   docker compose up -d                      # start the server
#   docker compose down                       # stop it
#   docker compose logs -f                    # tail logs
#   docker compose run --rm server init \
#         --data-dir /data                    # first-time: init ./data/server
#   docker compose run --rm plugin            # extract plugin → ./dist/plugin
#   docker compose run --rm binary            # extract binary → ./dist/bin
#   docker compose run --rm dev               # interactive dev shell
#   docker compose run --rm test              # run the Rust test suite
#
# Host directory layout (all relative to the repo root; all created on first use):
#   ./data/server/            persistent server state (certs, vaults, index, content)
#   ./data/cache/cargo-registry/   dev shell: downloaded crates
#   ./data/cache/cargo-git/        dev shell: git-sourced crates
#   ./data/cache/target/           dev shell: incremental compile cache
#   ./dist/bin/               extracted binary (from `run --rm binary`)
#   ./dist/plugin/            extracted plugin files (from `run --rm plugin`)
#
# All of these are gitignored. Wipe them freely — `docker compose run --rm server
# init --data-dir /data` will recreate the server layout.
# ==============================================================================

services:

  # ---------------------------------------------------------------------------
  # server — production runtime.
  # ---------------------------------------------------------------------------
  server:
    build:
      context: .
      target: server
    image: obsetync/server:local
    container_name: obsetync-server
    restart: unless-stopped
    environment:
      # Log verbosity. Override via `RUST_LOG=sync_server=debug docker compose up`.
      # Default: server info + global warnings. Examples:
      #   sync_server=info                → sync events, enrollment, revocation
      #   sync_server=debug               → per-request detail + chunk/content uploads
      #   sync_server=trace               → plus AEAD internals
      RUST_LOG: "${RUST_LOG:-sync_server=debug,warn}"
    ports:
      # Sync API — exposed publicly (AEAD envelope + bearer token inside the ciphertext).
      - "27182:27182"
      # Admin UI — exposed publicly too. No auth by itself; put behind a
      # reverse proxy / VPN if the server is reachable from the open internet.
      - "27183:27183"
    volumes:
      # Host ./data → container /data (server's --data-dir).
      # The server initializes sub-dirs (ca/, vaults/, index/, content/,
      # enrollments/, devices/, server/) inside this path.
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Probe the actual /health route via the binary's built-in healthcheck
      # subcommand — the hardened runtime image has no curl, and the old
      # `getent hosts` probe never touched the server at all (it reported
      # "unhealthy" for 4 weeks while the server was fine). PATH-based so the
      # same probe works in both the Dockerfile image (/usr/local/bin) and
      # the nix image (nix-store path exported via config.Env).
      test: ["CMD", "sync-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # plugin — extract main.js + manifest.json + wasm/ → ./dist/plugin
  # ---------------------------------------------------------------------------
  plugin:
    build:
      context: .
      target: plugin-builder
    image: obsetync/plugin-builder:local
    profiles: ["tools"]
    volumes:
      - ./dist/plugin:/out
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mkdir -p /out &&
       rm -rf /out/wasm &&
       cp /build/plugin/main.js                /out/ &&
       cp /build/plugin/manifest.json          /out/ &&
       cp /build/plugin/styles.css             /out/ &&
       cp /build/plugin/wasm/sync_core.js      /out/ &&
       cp /build/plugin/wasm/sync_core_bg.wasm /out/ &&
       echo 'Plugin files written to ./dist/plugin'"

  # ---------------------------------------------------------------------------
  # binary — extract the server binary → ./dist/bin
  # ---------------------------------------------------------------------------
  binary:
    build:
      context: .
      target: server
    image: obsetync/server:local
    profiles: ["tools"]
    user: root
    volumes:
      - ./dist/bin:/host-out
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mkdir -p /host-out &&
       cp /usr/local/bin/sync-server /host-out/sync-server &&
       chmod 0755 /host-out/sync-server &&
       echo 'Binary written to ./dist/bin/sync-server'"

  # ---------------------------------------------------------------------------
  # dev — interactive dev shell. Source is bind-mounted, caches persist under
  # ./data/cache so subsequent cargo/npm runs are fast.
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: obsetync/dev:local
    profiles: ["tools"]
    volumes:
      - .:/build
      - ./data/cache/cargo-registry:/usr/local/cargo/registry
      - ./data/cache/cargo-git:/usr/local/cargo/git
      - ./data/cache/target:/build/target
    working_dir: /build
    stdin_open: true
    tty: true
    ports:
      - "27182:27182"
      - "27183:27183"
    command: bash

  # ---------------------------------------------------------------------------
  # test — one-shot `cargo test` over the workspace.
  # ---------------------------------------------------------------------------
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: obsetync/dev:local
    profiles: ["tools"]
    volumes:
      - .:/build
      - ./data/cache/cargo-registry:/usr/local/cargo/registry
      - ./data/cache/cargo-git:/usr/local/cargo/git
      - ./data/cache/target:/build/target
    working_dir: /build
    environment:
      CC: clang
    command: cargo test --workspace --locked
